<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detection System</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; padding: 40px; }
        .box { background: white; padding: 20px; border-radius: 10px; width: 600px; margin: auto; }
        textarea { width: 100%; height: 150px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; }
        h2 { color: #333; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Fake News Detection & Related News</h2>
        <form method="post">
            <textarea name="news" placeholder="Enter news here..." required></textarea><br><br>
            <button type="submit">Check News</button>
        </form>

        {% if prediction %}
            <h3>Prediction: {{ prediction }}</h3>
            <h4>Confidence: {{ confidence }}%</h4>

            <h4>Related Real News:</h4>
            <ul>
                {% for item in related_news %}
                    <li>{{ item }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    </div>
</body>
</html>
